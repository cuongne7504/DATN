spring.application.name=SportPro-Backend

# SQL Server - chinh lai username/password cho dung may ban
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SportPro;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA: chi map entity voi bang co san, KHONG tu tao bang
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

server.port=8080
